<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CELLER CONNECT | Professional Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #F4F4F7; 
            color: #1A1A1A;
            -webkit-font-smoothing: antialiased;
        }

        .white-card { 
            background: #FFFFFF;
            border: 1px solid #EAEAEA;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .white-card:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 12px 30px rgba(0,0,0,0.06); 
            border-color: #D1D1D1;
        }

        input, select { 
            background: transparent !important; 
            border: none;
            outline: none;
        }

        .input-underline {
            border-bottom: 1px solid #E0E0E0;
        }

        .input-underline:focus-within {
            border-bottom-color: #000;
        }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }

        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="cellerApp()" x-init="init()">

    <header class="sticky top-0 z-50 bg-[#F4F4F7]/95 backdrop-blur-md border-b border-gray-200">
        <div class="max-w-7xl mx-auto p-6 md:p-8">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="text-center md:text-left">
                    <h1 class="text-[10px] tracking-[0.5em] uppercase text-gray-400 mb-1 font-bold">Gestió d'Inventari</h1>
                    <p class="text-3xl font-light tracking-tighter">Celler<span class="font-bold italic">Connect</span></p>
                </div>
                
                <div class="flex items-center gap-4">
                    <button @click="showAdd = true" class="bg-black text-white px-8 py-3 rounded-full text-[10px] font-bold uppercase tracking-widest hover:bg-gray-800 transition-all shadow-lg">
                        Nova Referència
                    </button>
                </div>
            </div>

            <div class="mt-8 flex flex-wrap items-center justify-center md:justify-start gap-4 pt-6 border-t border-gray-200">
                <div class="flex items-center gap-2 bg-white px-5 py-2 rounded-full border border-gray-200 shadow-sm">
                    <i data-lucide="filter" class="w-3 h-3 text-gray-400"></i>
                    <select x-model="filterType" class="text-[10px] uppercase font-bold tracking-widest cursor-pointer">
                        <option value="Tots">Tots els estocs</option>
                        <template x-for="t in tipusOptions">
                            <option :value="t" x-text="t"></option>
                        </template>
                    </select>
                </div>

                <div class="flex items-center gap-2 bg-white px-5 py-2 rounded-full border border-gray-200 shadow-sm">
                    <i data-lucide="sort-asc" class="w-3 h-3 text-gray-400"></i>
                    <select x-model="sortBy" class="text-[10px] uppercase font-bold tracking-widest cursor-pointer">
                        <option value="nom">Per Nom de Vi</option>
                        <option value="celler">Per Celler</option>
                    </select>
                </div>
                
                <div class="text-[10px] uppercase tracking-widest text-gray-400 ml-auto hidden md:block">
                    Total: <span class="font-bold text-black" x-text="filteredVins().length"></span> Referències
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6 md:p-10">
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <template x-for="(vi, index) in filteredVins()" :key="vi.id">
                <div class="white-card rounded-[35px] p-8 flex flex-col justify-between relative overflow-hidden">
                    
                    <div class="mb-8">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[9px] uppercase tracking-[0.2em] font-bold text-gray-400" x-text="vi.cellerNom"></span>
                            <span class="text-[10px] font-mono opacity-40" x-text="vi.anyada || 'NV'"></span>
                        </div>
                        <h3 class="text-xl font-semibold leading-tight mb-4" x-text="vi.nom"></h3>
                        <div class="flex gap-2">
                            <span class="text-[8px] uppercase tracking-widest bg-black text-white px-3 py-1 rounded-full" x-text="vi.tipus"></span>
                            <span class="text-[8px] uppercase tracking-widest text-gray-400 border border-gray-200 px-3 py-1 rounded-full" x-text="vi.regio"></span>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <div class="flex justify-between items-center bg-gray-50 p-5 rounded-[24px] border border-gray-100">
                            <div>
                                <p class="text-[8px] uppercase tracking-widest text-gray-400 font-bold mb-1 italic">Celler</p>
                                <input type="number" x-model.number="vi.estocCeller" @input="saveData()" class="text-3xl font-light w-20">
                            </div>
                            <div class="flex flex-col gap-1">
                                <button @click="vi.estocCeller++; saveData()" class="p-1 hover:text-black text-gray-300 transition"><i data-lucide="chevron-up" class="w-5 h-5"></i></button>
                                <button @click="if(vi.estocCeller > 0) vi.estocCeller--; saveData()" class="p-1 hover:text-black text-gray-300 transition"><i data-lucide="chevron-down" class="w-5 h-5"></i></button>
                            </div>
                        </div>

                        <div class="flex justify-center gap-3 py-1">
                            <button @click="transfer(vi.id, 'celler', 'nevera')" class="text-[8px] uppercase font-bold text-gray-400 hover:text-black border border-gray-200 px-4 py-2 rounded-full transition-all flex items-center gap-2">
                                <i data-lucide="arrow-down-right" class="w-3 h-3"></i> A Nevera
                            </button>
                            <button @click="transfer(vi.id, 'nevera', 'celler')" class="text-[8px] uppercase font-bold text-gray-400 hover:text-black border border-gray-200 px-4 py-2 rounded-full transition-all flex items-center gap-2">
                                <i data-lucide="arrow-up-left" class="w-3 h-3"></i> A Celler
                            </button>
                        </div>

                        <div class="flex justify-between items-center border-2 border-black p-5 rounded-[24px] bg-white">
                            <div>
                                <p class="text-[8px] uppercase tracking-widest text-black font-bold mb-1">Nevera Servei</p>
                                <input type="number" x-model.number="vi.estocNevera" @input="saveData()" class="text-3xl font-bold w-20">
                            </div>
                            <div class="flex flex-col gap-1">
                                <button @click="vi.estocNevera++; saveData()" class="p-1 text-black"><i data-lucide="chevron-up" class="w-5 h-5"></i></button>
                                <button @click="if(vi.estocNevera > 0) vi.estocNevera--; saveData()" class="p-1 text-black"><i data-lucide="chevron-down" class="w-5 h-5"></i></button>
                            </div>
                        </div>
                    </div>
                    
                    <button @click="deleteVi(vi.id)" class="mt-8 text-[9px] uppercase tracking-widest text-red-300 hover:text-red-600 transition self-center">Eliminar Fitxa</button>
                </div>
            </template>
        </div>
    </main>

    <div x-show="showAdd" x-cloak class="fixed inset-0 z-[60] flex justify-end">
        <div @click="showAdd = false" class="absolute inset-0 bg-black/10 backdrop-blur-sm transition-opacity"></div>
        <div class="relative w-full max-w-xl bg-white h-full p-12 shadow-2xl overflow-y-auto" x-transition:enter="transition transform duration-500" x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0">
            <div class="flex justify-between items-center mb-12">
                <h2 class="text-3xl font-light italic">Nova Referència</h2>
                <button @click="showAdd = false" class="text-gray-300 hover:text-black"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>

            <div class="space-y-10">
                <div>
                    <label class="text-[10px] uppercase tracking-widest text-gray-400 block mb-4 font-bold">Classificació</label>
                    <div class="flex flex-wrap gap-2">
                        <template x-for="t in tipusOptions">
                            <button @click="form.tipus = t" 
                                    :class="form.tipus === t ? 'bg-black text-white' : 'bg-gray-100 text-gray-400'"
                                    class="text-[9px] uppercase px-5 py-2.5 rounded-full transition-all border border-transparent" 
                                    x-text="t"></button>
                        </template>
                    </div>
                </div>

                <div class="input-underline py-2">
                    <label class="text-[10px] uppercase text-gray-400 block mb-1 font-bold">Celler / Productor</label>
                    <input type="text" x-model="form.cellerNom" placeholder="..." class="w-full text-lg">
                </div>
                
                <div class="input-underline py-2">
                    <label class="text-[10px] uppercase text-gray-400 block mb-1 font-bold">Nom comercial del vi</label>
                    <input type="text" x-model="form.nom" placeholder="..." class="w-full text-2xl font-semibold italic">
                </div>

                <div class="grid grid-cols-2 gap-8">
                    <div class="input-underline py-2">
                        <label class="text-[10px] uppercase text-gray-400 block mb-1">Anyada</label>
                        <input type="text" x-model="form.anyada" placeholder="Ex: 2021" class="w-full">
                    </div>
                    <div class="input-underline py-2">
                        <label class="text-[10px] uppercase text-gray-400 block mb-1">D.O. / Regió</label>
                        <input type="text" x-model="form.regio" placeholder="Ex: Priorat" class="w-full">
                    </div>
                </div>

                <div class="bg-gray-50 p-8 rounded-[30px] grid grid-cols-2 gap-8 border border-gray-100">
                    <div>
                        <label class="text-[10px] uppercase text-gray-400 block mb-2 font-bold italic">Estoc Celler</label>
                        <input type="number" x-model.number="form.estocCeller" class="w-full py-2 text-2xl font-light">
                    </div>
                    <div>
                        <label class="text-[10px] uppercase text-gray-400 block mb-2 font-bold italic">Estoc Nevera</label>
                        <input type="number" x-model.number="form.estocNevera" class="w-full py-2 text-2xl font-light">
                    </div>
                </div>

                <button @click="addVi()" class="w-full bg-black text-white py-6 rounded-full font-bold uppercase text-[11px] tracking-[0.4em] hover:bg-gray-800 transition-all shadow-xl">
                    Registrar al Celler
                </button>
            </div>
        </div>
    </div>

    <script>
        function cellerApp() {
            return {
                showAdd: false,
                vins: [],
                filterType: 'Tots',
                sortBy: 'nom',
                tipusOptions: ['Blanc', 'Negre', 'Escumós', 'Dolç', 'Generós', 'De Licor', 'Vi Ranci'],
                form: { cellerNom: '', nom: '', anyada: '', regio: '', tipus: 'Blanc', estocCeller: 0, estocNevera: 0 },

                init() {
                    const saved = localStorage.getItem('celler_connect_v1');
                    if (saved) {
                        this.vins = JSON.parse(saved);
                    }
                    this.refresh();
                },

                saveData() {
                    localStorage.setItem('celler_connect_v1', JSON.stringify(this.vins));
                },

                filteredVins() {
                    let list = [...this.vins];
                    
                    if (this.filterType !== 'Tots') {
                        list = list.filter(v => v.tipus === this.filterType);
                    }

                    return list.sort((a, b) => {
                        if (this.sortBy === 'celler') {
                            return (a.cellerNom || "").localeCompare(b.cellerNom || "");
                        }
                        return (a.nom || "").localeCompare(b.nom || "");
                    });
                },

                addVi() {
                    if (!this.form.nom || !this.form.cellerNom) return alert("Indica el Celler i el Nom");
                    this.vins.push({
                        id: Date.now(),
                        cellerNom: this.form.cellerNom,
                        nom: this.form.nom,
                        anyada: this.form.anyada,
                        regio: this.form.regio || 'S.R.',
                        tipus: this.form.tipus,
                        estocCeller: parseInt(this.form.estocCeller) || 0,
                        estocNevera: parseInt(this.form.estocNevera) || 0
                    });
                    this.saveData();
                    this.form = { cellerNom: '', nom: '', anyada: '', regio: '', tipus: 'Blanc', estocCeller: 0, estocNevera: 0 };
                    this.showAdd = false;
                    this.refresh();
                },

                transfer(id, from, to) {
                    const idx = this.vins.findIndex(v => v.id === id);
                    const fromKey = from === 'celler' ? 'estocCeller' : 'estocNevera';
                    const toKey = to === 'celler' ? 'estocCeller' : 'estocNevera';
                    
                    if (this.vins[idx][fromKey] > 0) {
                        this.vins[idx][fromKey]--;
                        this.vins[idx][toKey]++;
                        this.saveData();
                    }
                },

                deleteVi(id) {
                    if(confirm("Vols eliminar aquesta referència de l'inventari?")) {
                        this.vins = this.vins.filter(v => v.id !== id);
                        this.saveData();
                    }
                },

                refresh() {
                    setTimeout(() => lucide.createIcons(), 50);
                }
            }
        }
    </script>
</body>
</html>
